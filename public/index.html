<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Transcript</title>
    <meta
      name="description"
      content="Extract timestamped YouTube subtitles and download as TXT or SRT."
    />
    <meta
      name="keywords"
      content="youtube subtitles, srt generator, transcript extractor"
    />
    <meta property="og:title" content="YT Transcript" />
    <meta
      property="og:description"
      content="Generate TXT and SRT subtitle files from YouTube videos."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/output.css" />
  </head>

  <body
    class="bg-[#0a0a0a] text-zinc-100 min-h-screen flex flex-col justify-center items-center p-5 antialiased selection:bg-red-500/30"
  >
    <main class="w-full max-w-3xl space-y-8">
      <header class="space-y-3">
        <div class="flex items-center gap-2">
          <span class="inline-block w-2 h-7 bg-red-500 rounded-sm"></span>
          <h1 class="text-2xl font-bold tracking-tight text-white">
            YT Transcript
          </h1>
        </div>
        <p class="text-zinc-500 text-sm pl-4 border-l border-zinc-800">
          Paste a YouTube URL — get clean, timestamped subtitles ready to
          export.
        </p>
      </header>

      <section
        class="bg-zinc-900/60 border border-zinc-800 rounded-2xl p-6 space-y-4 shadow-xl shadow-black/40"
      >
        <div class="flex flex-col sm:flex-row gap-3">
          <input
            id="videoUrl"
            type="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://youtube.com/watch?v=..."
            class="flex-1 bg-zinc-950 border border-zinc-800 text-zinc-100 placeholder:text-zinc-600 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500/60 focus:border-red-500 transition-all"
          />
          <button
            id="fetchBtn"
            class="bg-red-600 hover:bg-red-500 active:scale-[0.98] transition-all text-white px-7 py-3 rounded-xl text-sm font-semibold cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
          >
            Extract
          </button>
        </div>

        <div id="statusMsg" class="hidden" aria-live="polite"></div>
      </section>

      <section id="outputWrapper" class="hidden space-y-3">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <span
            class="text-xs text-zinc-500 uppercase tracking-widest font-medium"
            >Transcript</span
          >
          <div class="flex gap-2">
            <button
              id="exportTxt"
              class="flex items-center gap-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-4 py-2 rounded-lg text-xs font-medium transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
              </svg>
              TXT
            </button>
            <button
              id="exportSrt"
              class="flex items-center gap-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-4 py-2 rounded-lg text-xs font-medium transition-all"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
                <line x1="7" y1="2" x2="7" y2="22" />
                <line x1="17" y1="2" x2="17" y2="22" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <line x1="2" y1="7" x2="7" y2="7" />
                <line x1="2" y1="17" x2="7" y2="17" />
                <line x1="17" y1="17" x2="22" y2="17" />
                <line x1="17" y1="7" x2="22" y2="7" />
              </svg>
              SRT
            </button>
          </div>
        </div>

        <div
          id="displayPane"
          class="h-[420px] overflow-y-auto bg-zinc-950 border border-zinc-800/70 rounded-xl p-4 font-mono text-xs space-y-0.5 scroll-smooth"
        ></div>
      </section>
    </main>

    <footer class="mt-10 text-zinc-700 text-xs">
      YT Transcript &mdash; no data stored, no sign-in required.
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
